name: Issue Planning - Command

on:
  issue_comment:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to start planning for
        required: true
        type: string
      initiator_login:
        description: Maintainer login that should be treated as the planning initiator
        required: false
        type: string
      comment_body:
        description: Optional comment body to treat as the maintainer trigger context
        required: false
        default: ""
        type: string
      auto_start:
        description: Start planning automatically for a maintainer-authored Product-fit issue
        required: false
        default: "false"
        type: string

permissions:
  actions: write
  contents: read
  issues: write

concurrency:
  group: issue-planning-command-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: false

jobs:
  dispatch:
    if: github.event_name == 'workflow_dispatch' || github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}
      COMMENT_AUTHOR: ${{ github.event.inputs.initiator_login || github.event.comment.user.login || github.actor }}
      COMMENT_BODY: ${{ github.event.inputs.comment_body || github.event.comment.body || '' }}
      AUTO_START: ${{ github.event.inputs.auto_start || 'false' }}
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Accept /doit and start planning
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys

          repo = os.environ["REPO"]
          issue_number = os.environ["ISSUE_NUMBER"]
          author = os.environ["COMMENT_AUTHOR"]
          raw_body = os.environ.get("COMMENT_BODY", "")
          auto_start = os.environ.get("AUTO_START", "").strip().lower() == "true"
          event_name = os.environ.get("EVENT_NAME", "")
          body = raw_body.lstrip()
          command_pattern = re.compile(r"(?i)(?:^|(?<=\s))/doit(?=$|[\s.!?,:;])")

          if event_name != "workflow_dispatch" and not auto_start and not command_pattern.search(body):
              print("Comment does not contain a /doit command; nothing to do.")
              sys.exit(0)

          context_lines = []
          if not auto_start:
              for line in raw_body.splitlines():
                  cleaned_line = command_pattern.sub("", line).strip()
                  if cleaned_line:
                      context_lines.append(cleaned_line)

          command_context = "\n".join(context_lines)
          if len(command_context) > 600:
              command_context = command_context[:597].rstrip() + "..."

          def gh_json(*args):
              return json.loads(subprocess.check_output(["gh", *args], text=True))

          def gh(*args):
              print("+", "gh", *args)
              subprocess.run(["gh", *args], check=True)

          try:
              permission_payload = gh_json(
                  "api",
                  f"/repos/{repo}/collaborators/{author}/permission",
              )
              permission = permission_payload.get("permission", "")
          except subprocess.CalledProcessError:
              permission = ""

          if permission not in {"write", "maintain", "admin"}:
              if auto_start:
                  print(
                      f"Auto-start skipped because @{author} does not currently have repository write access "
                      f"(permission: {permission or 'none'})."
                  )
                  sys.exit(0)
              gh(
                  "issue",
                  "comment",
                  issue_number,
                  "--repo",
                  repo,
                  "--body",
                  (
                      "### 🛂 Planning Command Rejected\n\n"
                      f"`/doit` can only be used by someone with repository write access. "
                      f"Current permission for `@{author}`: `{permission or 'none'}`."
                  ),
              )
              sys.exit(0)

          issue = gh_json(
              "issue",
              "view",
              issue_number,
              "--repo",
              repo,
              "--json",
              "labels,title",
          )
          labels = {label["name"] for label in issue.get("labels", [])}
          has_planning_state = any(label.startswith("planning:") for label in labels)

          if "triage:product-fit" not in labels and not has_planning_state:
              if auto_start:
                  print(
                      f"Auto-start skipped because issue #{issue_number} is not currently marked "
                      "`triage:product-fit`."
                  )
                  sys.exit(0)
              gh(
                  "issue",
                  "comment",
                  issue_number,
                  "--repo",
                  repo,
                  "--body",
                  (
                      "### 🛂 Planning Command Blocked\n\n"
                      f"`/doit` from `@{author}` was accepted as an authorised maintainer command, "
                      "but Product validation has not yet marked this issue `triage:product-fit`. "
                      "Resolve Product validation first, then run `/doit` again."
                  ),
              )
              sys.exit(0)

          cmd = [
              "python3",
              ".github/scripts/start_issue_planning.py",
              "--repo",
              repo,
              "--issue-number",
              issue_number,
              "--author",
              author,
              "--mode",
              "auto" if auto_start else "manual",
          ]
          if command_context:
              cmd.extend(["--context", command_context])
          print("+", " ".join(cmd))
          subprocess.run(cmd, check=True)
          PY
