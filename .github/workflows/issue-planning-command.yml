name: Issue Planning - Command

on:
  issue_comment:
    types: [created, edited]

permissions:
  actions: write
  contents: read
  issues: write

concurrency:
  group: issue-planning-command-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  dispatch:
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
      COMMENT_BODY: ${{ github.event.comment.body }}
    steps:
      - name: Accept /doit and start planning
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys

          repo = os.environ["REPO"]
          issue_number = os.environ["ISSUE_NUMBER"]
          author = os.environ["COMMENT_AUTHOR"]
          body = os.environ["COMMENT_BODY"].lstrip()

          if not re.match(r"^/doit(?:\s|$)", body, re.IGNORECASE):
              print("Comment is not a /doit command; nothing to do.")
              sys.exit(0)

          def gh_json(*args):
              return json.loads(subprocess.check_output(["gh", *args], text=True))

          def gh(*args):
              print("+", "gh", *args)
              subprocess.run(["gh", *args], check=True)

          try:
              permission_payload = gh_json(
                  "api",
                  f"/repos/{repo}/collaborators/{author}/permission",
              )
              permission = permission_payload.get("permission", "")
          except subprocess.CalledProcessError:
              permission = ""

          if permission not in {"write", "maintain", "admin"}:
              gh(
                  "issue",
                  "comment",
                  issue_number,
                  "--repo",
                  repo,
                  "--body",
                  (
                      "### 🛂 Planning Command Rejected\n\n"
                      f"`/doit` can only be used by someone with repository write access. "
                      f"Current permission for `@{author}`: `{permission or 'none'}`."
                  ),
              )
              sys.exit(0)

          issue = gh_json(
              "issue",
              "view",
              issue_number,
              "--repo",
              repo,
              "--json",
              "labels,title",
          )
          labels = {label["name"] for label in issue.get("labels", [])}

          planning_labels = {
              "planning:in-discussion",
              "planning:needs-product",
              "planning:needs-security",
              "planning:needs-performance",
              "planning:needs-quality",
              "planning:needs-architecture",
          }
          reset_labels = {
              "triage:pending-product-validation",
              "triage:product-fit",
              "triage:needs-clarification",
              "triage:out-of-scope",
              "planning:ready-for-dev",
              "planning:product-approved",
              "planning:security-approved",
              "planning:performance-approved",
              "planning:quality-approved",
              "planning:architecture-approved",
          }
          has_planning_state = any(label.startswith("planning:") for label in labels)

          if "triage:product-fit" not in labels and not has_planning_state:
              gh(
                  "issue",
                  "comment",
                  issue_number,
                  "--repo",
                  repo,
                  "--body",
                  (
                      "### 🛂 Planning Command Blocked\n\n"
                      f"`/doit` from `@{author}` was accepted as an authorised maintainer command, "
                      "but Product validation has not yet marked this issue `triage:product-fit`. "
                      "Resolve Product validation first, then run `/doit` again."
                  ),
              )
              sys.exit(0)

          add_labels = sorted(label for label in planning_labels if label not in labels)
          remove_labels = sorted(label for label in reset_labels if label in labels)
          if add_labels or remove_labels:
              cmd = ["issue", "edit", issue_number, "--repo", repo]
              if add_labels:
                  cmd.extend(["--add-label", ",".join(add_labels)])
              if remove_labels:
                  cmd.extend(["--remove-label", ",".join(remove_labels)])
              gh(*cmd)

          gh(
              "issue",
              "comment",
              issue_number,
              "--repo",
              repo,
              "--body",
              (
                  "### 🗂️ Planning Kickoff\n\n"
                  f"`/doit` from `@{author}` was accepted, so Product, Security, Performance, Code Quality, and Architecture are now joining this thread. "
                  "Answer unresolved questions in-thread until the team converges. "
                  f"When `planning:ready-for-dev` appears, open a pull request that includes `Plan issue: #{issue_number}` in the body."
              ),
          )
          PY
