name: Issue Planning - Reconcile State

on:
  workflow_run:
    workflows:
      - Issue Planning - Product
      - Issue Planning - Security
      - Issue Planning - Performance
      - Issue Planning - Code Quality
      - Issue Planning - Architecture
      - Issue Planning - Reliability
      - Issue Planning - Design
      - Issue Planning - Engineering Manager
    types: [completed]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to reconcile (optional)
        required: false
        type: string

permissions:
  actions: write
  contents: read
  issues: write

concurrency:
  group: issue-planning-reconcile
  cancel-in-progress: false

jobs:
  reconcile:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.event == 'workflow_dispatch' ||
      github.event.workflow_run.head_branch == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - name: Reconcile planning labels
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          REPO = os.environ["REPO"]
          ISSUE_NUMBER = os.environ.get("ISSUE_NUMBER", "").strip()
          APPROVAL_TO_PENDING = {
              "planning:product-approved": "planning:needs-product",
              "planning:security-approved": "planning:needs-security",
              "planning:performance-approved": "planning:needs-performance",
              "planning:quality-approved": "planning:needs-quality",
              "planning:architecture-approved": "planning:needs-architecture",
              "planning:reliability-approved": "planning:needs-reliability",
              "planning:design-approved": "planning:needs-design",
          }
          TECHNICAL_HEADINGS = (
              "### 🧭 Product",
              "### 🔐 Security",
              "### ⚡ Performance",
              "### 🧹 Code Quality",
              "### 🏗️ Architecture",
              "### 🛡️ Reliability",
              "### 🎨 Design",
          )

          def gh_json(*args):
              return json.loads(subprocess.check_output(["gh", *args], text=True))

          def gh(*args):
              print("+", "gh", *args)
              subprocess.run(["gh", *args], check=True)

          def load_issue(number, fields="number,labels,title"):
              return gh_json(
                  "issue",
                  "view",
                  str(number),
                  "--repo",
                  REPO,
                  "--json",
                  fields,
              )

          def latest_em_state(comments):
              latest_decision = ""
              latest_timestamp = ""
              for comment in comments:
                  body = comment.get("body", "")
                  if not body.startswith("### 👔 Engineering Manager"):
                      continue
                  decision = ""
                  for line in body.splitlines():
                      if line.lower().startswith("decision:"):
                          decision = line.split(":", 1)[1].strip().lower()
                          break
                  if decision in {"approved", "challenge"}:
                      latest_decision = decision
                      latest_timestamp = comment.get("createdAt", "") or comment.get("updatedAt", "")
              return latest_decision, latest_timestamp

          def latest_technical_comment_at(comments):
              latest = ""
              for comment in comments:
                  body = comment.get("body", "")
                  if any(body.startswith(heading) for heading in TECHNICAL_HEADINGS):
                      latest = max(latest, comment.get("createdAt", "") or comment.get("updatedAt", ""))
              return latest

          if ISSUE_NUMBER:
              issues = [load_issue(ISSUE_NUMBER)]
          else:
              issues = []
              page = 1
              while True:
                  batch = gh_json(
                      "api",
                      f"/repos/{REPO}/issues?state=open&per_page=100&page={page}",
                  )
                  if not batch:
                      break
                  issues.extend(item for item in batch if "pull_request" not in item)
                  page += 1

          reconciled = 0
          for issue in issues:
              number = issue["number"]
              labels = {label["name"] for label in issue.get("labels", [])}
              if not any(label.startswith("planning:") for label in labels):
                  continue

              comment_snapshot = load_issue(number, "comments")
              comments = comment_snapshot.get("comments", [])
              has_ready_comment = any(
                  comment.get("author", {}).get("login") in {"github-actions", "github-actions[bot]"}
                  and comment.get("body", "").startswith("### ✅ Planning Ready")
                  for comment in comments
              )

              all_approved = all(label in labels for label in APPROVAL_TO_PENDING)
              em_decision, em_timestamp = latest_em_state(comments)
              latest_specialist_timestamp = latest_technical_comment_at(comments)
              em_is_current = em_decision == "approved" and (not latest_specialist_timestamp or em_timestamp >= latest_specialist_timestamp)
              desired_add = set()
              desired_remove = set()

              if all_approved and em_is_current:
                  desired_add.add("planning:ready-for-dev")
                  desired_remove.add("planning:in-discussion")
              else:
                  desired_add.add("planning:in-discussion")
                  desired_remove.add("planning:ready-for-dev")

              for approval_label, pending_label in APPROVAL_TO_PENDING.items():
                  if approval_label in labels:
                      desired_remove.add(pending_label)
                  else:
                      desired_add.add(pending_label)

              add_labels = sorted(label for label in desired_add if label not in labels)
              remove_labels = sorted(label for label in desired_remove if label in labels)

              was_ready = "planning:ready-for-dev" in labels
              will_be_ready = all_approved and em_is_current

              if add_labels or remove_labels:
                  cmd = ["issue", "edit", str(number), "--repo", REPO]
                  if add_labels:
                      cmd.extend(["--add-label", ",".join(add_labels)])
                  if remove_labels:
                      cmd.extend(["--remove-label", ",".join(remove_labels)])
                  try:
                      gh(*cmd)
                  except subprocess.CalledProcessError:
                      # Label may not exist yet — create any missing ones and retry
                      print(f"Warning: label edit failed for issue #{number}; creating missing labels")
                      for label in add_labels:
                          try:
                              # Check if label exists before creating to avoid mutating existing config
                              view_result = subprocess.run(
                                  ["gh", "label", "view", label, "--repo", REPO],
                                  check=False, capture_output=True, text=True,
                              )
                              if view_result.returncode == 0:
                                  continue
                              subprocess.run(
                                  ["gh", "label", "create", label, "--repo", REPO, "--color", "C5DEF5"],
                                  check=True, capture_output=True, text=True,
                              )
                              print(f"  Created label: {label}")
                          except subprocess.CalledProcessError:
                              pass
                      try:
                          gh(*cmd)
                      except subprocess.CalledProcessError:
                          print(f"  Retry failed for issue #{number}; skipping")
                          continue

              if will_be_ready and not has_ready_comment:
                  gh(
                      "issue",
                      "comment",
                      str(number),
                      "--repo",
                      REPO,
                      "--body",
                      f"### ✅ Planning Ready\n\nAll seven planning reviewers have approved this issue and Sam Chen has left the latest Engineering Manager sign-off. `planning:ready-for-dev` is now set and the remaining pending labels have been cleared.\n\nNext step: `Issue Ready to PR` will now attempt to implement this plan and open a pull request that includes `Plan issue: #{number}` in the body. If no PR appears, re-run `Issue Ready to PR` manually for this issue.",
                  )
                  gh(
                      "workflow",
                      "run",
                      "issue-ready-to-pr.lock.yml",
                      "--repo",
                      REPO,
                      "-f",
                      f"issue_number={number}",
                  )
                  try:
                      subprocess.run(
                          [
                              "gh",
                              "workflow",
                              "run",
                              "issue-planning-synthesis.lock.yml",
                              "--repo",
                              REPO,
                              "-f",
                              f"issue_number={number}",
                          ],
                          check=True,
                      )
                      print(f"Dispatched synthesis for issue #{number}")
                  except subprocess.CalledProcessError:
                      print(f"Synthesis dispatch failed for issue #{number} (workflow may not exist yet)")
              elif was_ready and not will_be_ready:
                  gh(
                      "issue",
                      "comment",
                      str(number),
                      "--repo",
                      REPO,
                      "--body",
                      "### ♻️ Planning Reopened\n\nAt least one planning approval is no longer present, or the latest Engineering Manager sign-off is no longer current, so `planning:ready-for-dev` has been removed and the issue is back in discussion.",
                  )

              print(
                  f"Reconciled issue #{number}: add={add_labels}, remove={remove_labels}, ready={will_be_ready}, em_decision={em_decision}, em_current={em_is_current}, has_ready_comment={has_ready_comment}"
              )
              reconciled += 1

          print(f"Reconciled {reconciled} planning issue(s).")
          PY
