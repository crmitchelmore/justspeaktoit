name: PR Plan Review - Rate Limit Retry

on:
  workflow_run:
    workflows:
      - PR Plan Review - Product
      - PR Plan Review - Security
      - PR Plan Review - Performance
      - PR Plan Review - Code Quality
      - PR Plan Review - Architecture
      - PR Plan Review - Design
    types: [completed]

permissions:
  actions: write
  contents: read
  pull-requests: write

concurrency:
  group: pr-plan-review-rate-limit-retry-${{ github.event.workflow_run.id }}-${{ github.event.workflow_run.run_attempt }}
  cancel-in-progress: false

jobs:
  rerun:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      RUN_ID: ${{ github.event.workflow_run.id }}
      RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
      WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
      PULL_REQUESTS_JSON: ${{ toJson(github.event.workflow_run.pull_requests) }}
    steps:
      - name: Retry rate-limited PR plan review workflows
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys
          import time

          repo = os.environ["REPO"]
          run_id = os.environ["RUN_ID"]
          run_attempt = int(os.environ.get("RUN_ATTEMPT") or "1")
          workflow_name = os.environ["WORKFLOW_NAME"]
          pull_requests = json.loads(os.environ.get("PULL_REQUESTS_JSON") or "[]")
          max_attempts = 3
          lower_markers = (
              "hit a rate limit",
              "copilot model requests",
              "please try again in 1 minute",
          )

          result = subprocess.run(
              ["gh", "run", "view", run_id, "--repo", repo, "--log-failed"],
              check=False,
              capture_output=True,
              text=True,
          )
          logs = "\n".join(part for part in [result.stdout, result.stderr] if part)
          logs_lower = logs.lower()

          if not any(marker in logs_lower for marker in lower_markers):
              print(f"Run {run_id} for '{workflow_name}' did not fail due to a Copilot rate limit; skipping.")
              sys.exit(0)

          if run_attempt >= max_attempts:
              print(
                  f"Run {run_id} for '{workflow_name}' exhausted {run_attempt} attempts after repeated rate limits."
              )
              if pull_requests:
                  pr_number = str(pull_requests[0]["number"])
                  subprocess.run(
                      [
                          "gh",
                          "pr",
                          "comment",
                          pr_number,
                          "--repo",
                          repo,
                          "--body",
                          (
                              "### ⚠️ PR Plan Review Retry Exhausted\n\n"
                              f"`{workflow_name}` hit the Copilot rate limit on all {run_attempt} attempts. "
                              "Please rerun that workflow manually once capacity clears."
                          ),
                      ],
                      check=False,
                  )
              sys.exit(0)

          delay_seconds = 75 * run_attempt
          print(
              f"Run {run_id} for '{workflow_name}' failed due to a Copilot rate limit. "
              f"Waiting {delay_seconds} seconds before rerunning attempt {run_attempt + 1}/{max_attempts}."
          )
          time.sleep(delay_seconds)

          subprocess.run(["gh", "run", "rerun", run_id, "--repo", repo], check=True)
          print(f"Requested rerun for '{workflow_name}' (run {run_id}).")
          PY
