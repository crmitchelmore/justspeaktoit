name: Conformance PR Review

on:
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-conformance
  cancel-in-progress: true

jobs:
  conformance-pr-review:
    name: Advisory conformance review
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        continue-on-error: true
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run advisory conformance review
        uses: crmitchelmore/quality-software/.github/actions/conformance-pr-review@2abcbce1670b0cbc154610c9f60dd19b5f87e8c3 # v0.1.0
        with:
          base-ref: ${{ github.base_ref || 'main' }}
