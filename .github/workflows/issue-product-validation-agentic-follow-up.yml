name: Issue Product Validation - Agentic Follow Up

on:
  workflow_run:
    workflows:
      - CI Failure Doctor
      - Daily Perf Improver
      - Daily Repo Status
      - Daily Test Improver
      - Improvement Coordinator
      - Issue Ready to PR
      - Repository Quality Improver
    types: [completed]

permissions:
  actions: write
  contents: read
  issues: read

concurrency:
  group: issue-product-validation-agentic-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  dispatch:
    if: github.event.workflow_run.repository.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      RUN_ID: ${{ github.event.workflow_run.id }}
      RUN_NAME: ${{ github.event.workflow_run.name }}
    steps:
      - name: Dispatch Product validation for any issue created by this run
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import time

          repo = os.environ["REPO"]
          run_id = os.environ["RUN_ID"]
          run_name = os.environ["RUN_NAME"]

          def gh_json(*args):
              return json.loads(subprocess.check_output(["gh", *args], text=True))

          def gh(*args):
              print("+", "gh", *args)
              subprocess.run(["gh", *args], check=True)

          def find_candidate_issues():
              issues = gh_json(
                  "issue",
                  "list",
                  "--repo",
                  repo,
                  "--state",
                  "open",
                  "--limit",
                  "100",
                  "--json",
                  "number,author,body,labels,state,title",
              )
              needle = f"actions/runs/{run_id}"
              return [issue for issue in issues if needle in (issue.get("body") or "")]

          items = []
          for attempt in range(12):
              items = find_candidate_issues()
              if items:
                  break
              time.sleep(10)

          if not items:
              print(f"No issue created by workflow run {run_id} ({run_name}) was found.")
              raise SystemExit(0)

          for item in items:
              issue_number = item["number"]
              author_login = ((item.get("author") or {}).get("login") or "").lower()
              body = item.get("body") or ""
              labels = {label["name"] for label in item.get("labels", [])}

              if item.get("state") != "OPEN":
                  print(f"Issue #{issue_number} is not open; skipping.")
                  continue

              if author_login not in {"app/github-actions", "github-actions", "github-actions[bot]"}:
                  print(f"Issue #{issue_number} was not authored by GitHub Actions; skipping.")
                  continue

              if "<!-- gh-aw-agentic-workflow:" not in body:
                  print(f"Issue #{issue_number} is missing the agentic workflow marker; skipping.")
                  continue

              if any(label.startswith("triage:") or label.startswith("planning:") for label in labels):
                  print(f"Issue #{issue_number} already has triage/planning state; skipping.")
                  continue

              gh(
                  "workflow",
                  "run",
                  "issue-product-validation.lock.yml",
                  "--repo",
                  repo,
                  "-f",
                  f"issue_number={issue_number}",
              )
          PY
